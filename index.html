<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChaosChat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #c2c0b6;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ── Setup (pantalla inicial) ── */
    #setup {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #setup h1 {
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 4px;
    }

    #setup p {
      font-size: 13px;
      color: #666;
    }

    .field-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #c2c0b6;
      font-size: 13px;
      padding: 8px 12px;
      font-family: monospace;
    }

    input:focus { outline: none; border-color: #534AB7; }

    .key-row {
      display: flex;
      gap: 8px;
    }

    .key-row input { flex: 1; }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #534AB7;
      color: #EEEDFE;
      width: 100%;
    }

    .btn-secondary {
      background: transparent;
      color: #534AB7;
      border: 1px solid #534AB7;
      width: 100%;
    }

    /* ── Chatbox ── */
    #chatbox {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 90vh;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .chat-header h2 {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }

    /* Clave en caliente */
    .key-bar {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .key-bar input {
      flex: 1;
      padding: 6px 8px;
      font-size: 11px;
    }

    .btn-key {
      background: transparent;
      color: #534AB7;
      border: 1px solid #534AB7;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .btn-key:hover { opacity: 0.8; }

    /* Feed de mensajes */
    #msg-feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #msg-feed::-webkit-scrollbar { width: 4px; }
    #msg-feed::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* Mensajes */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .msg-wrapper.self  { align-self: flex-end;  align-items: flex-end; }
    .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-size: 11px;
      color: #666;
      margin-bottom: 3px;
    }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-wrapper.self  .msg-bubble { background: #534AB7; color: #EEEDFE; }
    .msg-wrapper.other .msg-bubble { background: #252525; color: #c2c0b6; }

    .msg-hex {
      font-size: 10px;
      color: #444;
      font-family: monospace;
      margin-top: 3px;
      word-break: break-all;
    }

    /* Aviso de cambio de clave */
    .key-notice {
      align-self: center;
      font-size: 11px;
      color: #534AB7;
      background: #1a1530;
      border: 1px solid #534AB7;
      border-radius: 20px;
      padding: 4px 12px;
    }

    /* Input de mensaje */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
    }

    .btn-send {
      background: #534AB7;
      color: #EEEDFE;
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-send:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- ── Pantalla de configuración ── -->
  <div id="setup">
    <h1>ChaosChat</h1>
    <p>Cifrado de texto con el atractor de Lorenz + RK4</p>

    <div>
      <p class="field-label">Tu nombre</p>
      <input type="text" id="username" placeholder="ej: Alice">
    </div>

    <div>
      <p class="field-label">Sala</p>
      <input type="text" id="room-id" placeholder="ej: sala-secreta">
    </div>

    <div>
      <p class="field-label">Clave (x₀, y₀, z₀)</p>
      <div class="key-row">
        <input type="text" id="x0" placeholder="x₀">
        <input type="text" id="y0" placeholder="y₀">
        <input type="text" id="z0" placeholder="z₀">
      </div>
    </div>

    <button class="btn btn-secondary" onclick="generateKey()">
      Generar clave aleatoria
    </button>

    <button class="btn btn-primary" onclick="connect()">
      Entrar al chat
    </button>
  </div>

  <!-- ── Chatbox ── -->
  <div id="chatbox">

    <!-- Header -->
    <div class="chat-header">
      <h2>ChaosChat</h2>
      <div class="status">
        <div id="status-dot"></div>
        <span id="status-text">conectado</span>
      </div>
    </div>

    <!-- Cambiar clave en caliente -->
    <div class="key-bar">
      <input type="text" id="x0" placeholder="x₀">
      <input type="text" id="y0" placeholder="y₀">
      <input type="text" id="z0" placeholder="z₀">
      <button class="btn-key" onclick="generateKey()">Generar</button>
      <button class="btn-key" onclick="applyKey()">Aplicar</button>
    </div>

    <!-- Mensajes -->
    <div id="msg-feed"></div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
      <button class="btn-send" onclick="sendMessage()">Enviar</button>
    </div>

  </div>

  <script src="lorenz_rk4.js"></script>
  <script src="chat.js"></script>
</body>
</html>
